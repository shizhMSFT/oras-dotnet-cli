remote_theme: just-the-docs/just-the-docs@v0.10.0

title: ORAS .NET CLI
description: Cross-platform .NET 10 CLI for managing OCI artifacts in container registries
url: https://shizhMSFT.github.io
baseurl: /oras-dotnet-cli

color_scheme: dark

logo: /assets/images/logo.svg

aux_links:
  GitHub: https://github.com/shizhMSFT/oras-dotnet-cli
  NuGet: https://www.nuget.org/packages/OrasProject.Oras

aux_links_new_tab: true

heading_anchors: true

nav_enabled: true
nav_sort: order

search_enabled: true
search.button: true
search.rel_url: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  <strong>ORAS .NET CLI</strong> &mdash; Built with ❤️ on .NET 10 &bull;
  <a href="https://github.com/shizhMSFT/oras-dotnet-cli">GitHub</a> &bull;
  <a href="https://oras.land">ORAS Project</a> &bull;
  Apache 2.0 License

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - design-review.md
  - prd.md
  - security-review.md
  - test-infrastructure.md
  - command-api-mapping.md
