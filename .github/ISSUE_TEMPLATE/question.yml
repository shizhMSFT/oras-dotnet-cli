name: Question
description: Ask a question about usage or functionality
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: Please be as specific as possible
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any additional context that might help us answer your question
      placeholder: What are you trying to accomplish?

  - type: textarea
    id: attempts
    attributes:
      label: What Have You Tried?
      description: Share any solutions you've already attempted
